syntax = "proto3";

package opencar.core.v1;

// MessageEnvelope is the core data structure for all communication between the
// vehicle and the client (e.g., mobile app). It follows an "envelope pattern,"
// where this message provides routing and metadata, while the actual
// vehicle-specific data is carried in the opaque `payload` field.
message MessageEnvelope {
  // A unique identifier for the car's make and model (e.g., "hmg_ioniq5",
  // "virtual_car"). This tells the client how to decode the `payload`.
  string car_id = 1;

  // A unique identifier for this specific message, which can be used for
  // request/response matching or message deduplication.
  uint32 message_id = 2;

  // The timestamp when the message was created, as a Unix timestamp in
  // milliseconds.
  uint64 timestamp_ms = 3;

  // MessageType defines the purpose of the message contained within the envelope.
  enum MessageType {
    // The message type is not specified. This is the default value and should
    // be treated as an error.
    MESSAGE_TYPE_UNSPECIFIED = 0;
    // A broadcast of the vehicle's current state. The payload will contain a
    // serialized `State` message for the given `car_id`.
    MESSAGE_TYPE_STATE_BROADCAST = 1;
    // A request from the client to the vehicle to perform an action. The payload
    // will contain a serialized `Command` message.
    MESSAGE_TYPE_COMMAND_REQUEST = 2;
    // A response from the vehicle to the client after a `COMMAND_REQUEST`.
    MESSAGE_TYPE_COMMAND_RESPONSE = 3;
    // A message containing system health information (e.g., battery, connectivity).
    MESSAGE_TYPE_SYSTEM_HEALTH = 4;
  }

  // The type of this message, which determines how the payload should be
  // interpreted.
  MessageType type = 4;

  // For `COMMAND_RESPONSE` messages, this indicates whether the requested
  // command was executed successfully.
  bool success = 5;

  // For `COMMAND_RESPONSE` messages where `success` is false, this field
  // contains a human-readable error message.
  string error_message = 6;

  // The opaque, serialized payload. The `type` and `car_id` fields determine
  // how to decode these bytes. For example, if `car_id` is "virtual_car" and
  // `type` is `STATE_BROADCAST`, this payload will be a serialized
  // `opencar.cars.virtual_car.v1.State` message.
  bytes payload = 7;
}
