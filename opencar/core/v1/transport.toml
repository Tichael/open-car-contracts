[mqtt]
command_topic_template = "opencar/{client_id}/cmd"
data_topic_template = "opencar/{client_id}/data"

[ble.service]
name = "Open Car Control"
uuid = "1acff001-229b-4d38-a5d2-9af1d9b11f00"

[ble.characteristics.app_to_device]
uuid = "1acff002-229b-4d38-a5d2-9af1d9b11f00"
payload = "opencar.core.v1.AppToDevice"
properties = ["write", "write_without_response"]
direction = "app -> device"

[ble.characteristics.device_to_app]
uuid = "1acff003-229b-4d38-a5d2-9af1d9b11f00"
payload = "opencar.core.v1.DeviceToApp"
properties = ["notify"]
direction = "device -> app"

[ble.pairing]
# How long (seconds) the device keeps its pairing window open after the
# pairing button is pressed. The app wizard uses this as its bond timeout.
pairing_window_seconds = 30
# How long (seconds) the wizard scans for an advertising device before
# declaring a timeout and asking the user to try again.
scan_timeout_seconds = 30

[ble.notes]
pairing = "Recommended before enabling control commands."
mtu = "Use the largest negotiated MTU available; protobuf payloads may span multiple ATT packets."
