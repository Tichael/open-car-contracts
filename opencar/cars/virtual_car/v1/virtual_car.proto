syntax = "proto3";

package opencar.cars.virtual_car.v1;

// Platform routing metadata (platform_name, platform_id CRC32) lives in meta.toml
// alongside this file — it is the single source of truth consumed by both the
// firmware build (xtask) and the mobile app build system.

// Basic state that can be broadcasted on any communication protocol.
message BasicState {
  // The odometer value of the car, in kilometers.
  optional uint32 odometer = 1;

  // Simple state indicating if the car is driving or not.
  optional bool is_driving = 2;

  // Simple state indicating if the car's doors are locked or not.
  optional bool are_doors_locked = 3;
}

// Advanced state that can only be shared over BLE.
message AdvancedState {
  // Represent the different gears possible in the car
  enum Gear {
    // Unspecified gear.
    GEAR_UNSPECIFIED = 0;
    // Parking gear.
    GEAR_PARK = 1;
    // Reverse gear.
    GEAR_REVERSE = 2;
    // Neutral gear.
    GEAR_NEUTRAL = 3;
    // Drive gear.
    GEAR_DRIVE = 4;
  }

  // The current car speed, in kph.
  optional int32 speed = 1;

  // The current gear selected in the car.
  optional Gear gear = 2;

  // Custom state for testing purposes.
  optional bool custom_state1 = 3;
}

// This contains a single basic command.
message BasicCommand {
  // A basic command.
  oneof action {
    // A lock door command.
    DoorLockCommand door_lock = 1;
  }
}

// This contains a single advanced command.
message AdvancedCommand {
  // An advanced command.
  oneof action {
    // A command to toggle the custom state 1.
    ToggleCustomState1Command toggle_custom_state1 = 1;
  }
}

// Command to lock or unlock the car's doors.
message DoorLockCommand {
  // Indicate if the door should be locked or unlocked.
  bool lock = 1;
}

// Command to toggle the custom state 1.
message ToggleCustomState1Command {}
