name: Proto Check

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  check:
    name: Lint, Format, and Breaking Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Buf Check
        uses: bufbuild/buf-action@v1.4.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          push: false
